services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////app/data/chat.db
    volumes:
      - db_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
