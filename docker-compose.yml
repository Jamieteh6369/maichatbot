services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////app/data/chat.db
    volumes:
      - db_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db-viewer:
    image: coleifer/sqlite-web
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    command: sqlite_web --host 0.0.0.0 /data/chat.db

volumes:
  db_data:
